# ============================================================
# 【行人版】DeepStream 行人計數 - camA 設定
# ============================================================

source_id: "camA"   # 來源代號（=CSV 的 CameraCode 欄位、OSD 標記、輸出檔名前綴）

# ============================================================
# 裝置資訊（寫入 CSV 的 DeviceCode 欄位）
# ============================================================
device:
  code: "EdgeX317"               # 邊緣機代碼，所有 cam 共用一台機器時值相同

# ============================================================
# 輸入來源
# ============================================================
source: "file:///home/nvidia/DeepStream-Person_Count/videos/test1.avi"                       # ⭐ 
                                # 影片：file:///絕對路徑.mp4
                                # 串流：rtsp://user:pass@ip:port/path
stream_fps: 15.0                # 影片或串流 FPS（用於計算 video_seconds 時間軸）                  # ⭐
start_time: "2025-05-22 00:23:57"
                                # 僅檔案模式有效；RTSP 自動忽略改用當下系統時間
                                # 格式：YYYY-MM-DD HH:MM:SS（影片首幀對應的真實時刻）

# ============================================================
# Engine 編譯設定（必須與 trtexec --maxShapes 完全對齊）
# ============================================================
# 改這幾個值後，必須重新跑 trtexec 編 engine：
#   trtexec --onnx=weight/X.onnx --saveEngine=X_fp16.engine --fp16 \
#           --minShapes=input:1x3xHxW \
#           --optShapes=input:Bx3xHxW \
#           --maxShapes=input:MAXx3xHxW
weight_imgsz: 640               # 行人模型的輸入解析度（pt → onnx 用 --size=640）                # ⭐
weight_batch_size: 4            # 行人 engine 的 max batch                                       # ⭐

# ============================================================
# 偵測閾值 
# ============================================================
detect:
  person_conf: 0.25             # PGIE 行人偵測信心值閾值
  person_iou:  0.45             # PGIE 行人偵測 NMS IoU 閾值

# ============================================================
# 座標基準 / ROI / 裁切遮罩 ⭐⭐⭐
# ============================================================
geometry:                                                                                   
  base_w: 1920                  # ROI 座標基準畫面寬度（與來源解析度一致）
  base_h: 1080                  # ROI 座標基準畫面高度

  # 計數 ROI：可定義多個區域，每個區域獨立判斷停留時間
  # 同一個行人若先後在多個 ROI 累積滿停留門檻，會分別產生多筆 CSV 紀錄
  # 每個 ROI 的名稱（roi_1 / roi_2 / entry / exit 等）會寫進 CSV 的 ROI 欄位
  regions:
    roi_1:                      # 區域 1（順時針定義多邊形）
      - [1330, 255]
      - [1475, 255]
      - [1455, 405]
      - [1240, 390]
    roi_2:                      # 區域 2
      - [1130, 575]
      - [1355, 575]
      - [1215, 1080]
      - [800, 1080]
    roi_3:                      # 區域 2
      - [345, 540]
      - [685, 600]
      - [420, 960]
      - [80, 765]
    # 若只要一個區域，留 roi_1 即可，把 roi_2 整段刪掉

  # 裁切遮罩：此矩形以外的區域不送進 PGIE（節省算力、避免誤偵）
  # 注意：DS preprocess 只接受矩形，多邊形會自動取外接矩形
  crop_points:
    - [0, 190]
    - [1920, 190]
    - [1920, 1080]
    - [0, 1080]

# ============================================================
# 統計 / 結算規則
# ============================================================
session:
  cleanup_frames: 30            # 物件消失幾幀後結算（單位：幀）
  flush_interval_seconds: 0    # 每 N 秒把 pending 結果寫進 CSV

# ============================================================
# 停留判斷門檻 ⭐⭐⭐
# ============================================================
# min_roi_hits = 停留滿幾幀才計為「有效停留」
# 計算公式：停留秒數 × stream_fps
#   3 秒 × 15 fps = 45 幀
#   5 秒 × 15 fps = 75 幀
# 全局單一門檻：所有 ROI 共用同一個 min_roi_hits
# 效果同時影響：
#   1) CSV 紀錄產生條件（達到此值才會輸出該 ROI 的一筆資料）
#   2) OSD 視覺化（達到此值的行人 bbox 變紅色）
track_logic:
  min_roi_hits: 45              # 15 fps × 3 秒 = 45 幀

# ============================================================
# 輸出設定
# ============================================================
# 命名規則：以 YAML 檔名為基底
#   yaml: ds_yaml/camA.yaml
#   影片輸出: {output_video_dir}/camA_output.mp4
#   CSV 輸出: {output_excel_dir}/camA.csv
output:
  save_output_video: true           # 是否輸出處理後影片（false = 只跑統計不存影片，省 IO） ⭐⭐⭐⭐⭐
  output_video_dir: "output_video"  # 影片輸出資料夾（相對 BASE_DIR 或絕對路徑）
  output_excel_dir: "output_excel"  # CSV 輸出資料夾

# ============================================================
# 顯示設定（本地視窗）
# ============================================================
# 本地視窗 = 邊緣機螢幕上跳出的預覽視窗
# 無頭部署、或多視窗會搶資源時建議全部關閉
display:
  show_window: true            # 是否開本地預覽視窗（批次跑或無頭部署可關閉省資源）
  show_fps_overlay: true        # 視窗左上角顯示即時 FPS
  show_roi: true                # 是否畫計數 ROI 黃線（nvdsanalytics 控制）
  show_crop: true               # 是否畫裁切框青綠線（nvdspreprocess 控制）

# ============================================================
# RTSP 推流設定（給中央監控主機收）⭐⭐⭐⭐⭐
# ============================================================
# 此區塊獨立於 display.show_window，可以「本地不開預覽，但推 RTSP 出去」。
# 中央主機用任何 RTSP 播放器（VLC、mpv、ffplay）連線即可看到含 OSD 的推理畫面。
#
# 連線範例：rtsp://<邊緣機 IP>:<port>/<mount_path>
# 例：       rtsp://192.168.1.100:8554/camA
#
# 注意：
#   1. 每路 cam 的 port 不可重複（同一台機器跑多路時要錯開）
#      或維持同一個 port、不同 mount_path 也行（DS 7 的 rtsp-server 支援）
#   2. 防火牆要放行對應 port (TCP)
#   3. Jetson 上需確認已裝 gir1.2-gst-rtsp-server-1.0 套件
rtsp_push:
  enable: true                  # 是否啟用 RTSP 推流（預設關閉，避免找不到套件時崩潰）
  port: 8554                    # RTSP server 監聽 port
  mount_path: "camA"            # URL 路徑名稱（rtsp://IP:port/{mount_path}）
  bitrate: 4000000              # 編碼位元率（bps），4M 適合 1080p；要清晰一點可拉到 8M
  encoder: "h264"               # 編碼格式：h264 (相容性高) 或 h265 (檔案小但部分播放器不支援)